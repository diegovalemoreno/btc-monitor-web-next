<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Signal Engine · Dashboard</title>
  <!-- Google Analytics — substitua G-15HNQW3JBH pelo seu Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-15HNQW3JBH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-15HNQW3JBH');
  </script>
  <style>
    /* ─── Design tokens (letabuild palette) ────── */
    :root {
      --bg:         #0a0a0a;
      --surface:    #111111;
      --surface2:   #161616;
      --surface3:   #1e1e1e;
      --border:     rgba(224,138,58,0.13);
      --border-dim: rgba(224,138,58,0.07);
      --border-solid: #1e1e1e;

      --text:       #e8e0d5;
      --text-sec:   #b0a090;
      --text-muted: #5a5040;

      --orange:     #e08a3a;
      --orange-dim: rgba(224,138,58,0.15);

      /* signal colors — letabuild exact */
      --buy-strong: #00C853;
      --buy:        #69F0AE;
      --neutral:    #FFD600;
      --sell:       #FF6D00;
      --sell-strong:#FF1744;

      /* regime → signal mapping */
      --regime-CAPITULATION_ZONE:       #00C853;
      --regime-TACTICAL_BUY_AGGRESSIVE: #00C853;
      --regime-TACTICAL_BUY_MODERATE:   #69F0AE;
      --regime-TACTICAL_BUY_LIGHT:      #a8e6c8;
      --regime-NEUTRAL:                 #FFD600;
      --regime-RISK_OFF:                #FF6D00;
      --regime-EXTREME_RISK:            #FF1744;
      --regime-OVERLEVERAGED_MARKET:    #FF1744;
      --regime-EUPHORIA_ZONE:           #FF1744;

      --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;

      --radius:    10px;
      --radius-sm: 8px;
      --shadow:    0 1px 4px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 16px;
    }

    .logo-group { display: flex; flex-direction: column; line-height: 1.3; }

    .logo {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.1px;
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--orange);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 14px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      padding-left: 34px;
    }

    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .timestamp {
      font-size: 11px;
      color: var(--text-sec);
      font-family: var(--font-mono);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    #refresh {
      background: transparent;
      border: 1px solid var(--orange-dim);
      color: var(--text-sec);
      padding: 5px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    #refresh:hover { border-color: var(--orange); color: var(--orange); background: rgba(224,138,58,0.06); }
    #refresh:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ─── Layout ────────────────────────────────── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ─── Section labels ─────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 28px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-dim);
    }

    /* ─── Cards ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ─── Hero grid ─────────────────────────────── */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border-solid);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }

    .hero-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .hero-value {
      font-size: 21px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.4px;
      font-family: var(--font-mono);
    }

    .hero-sub {
      font-size: 11px;
      color: var(--text-sec);
      margin-top: 8px;
      font-family: var(--font-mono);
    }

    /* ─── Regime / score / risk colors ──────────── */
    .regime-CAPITULATION_ZONE    { color: var(--buy-strong); }
    .regime-TACTICAL_BUY_AGGRESSIVE { color: var(--buy-strong); }
    .regime-TACTICAL_BUY_MODERATE   { color: var(--buy); }
    .regime-TACTICAL_BUY_LIGHT      { color: #a8e6c8; }
    .regime-NEUTRAL                 { color: var(--neutral); }
    .regime-RISK_OFF                { color: var(--sell); }
    .regime-EXTREME_RISK            { color: var(--sell-strong); }
    .regime-OVERLEVERAGED_MARKET    { color: var(--sell-strong); }
    .regime-EUPHORIA_ZONE           { color: var(--sell-strong); }

    .score-pos  { color: var(--buy-strong); }
    .score-neg  { color: var(--sell-strong); }
    .score-zero { color: var(--neutral); }

    .risk-LOW    { color: var(--buy-strong); font-weight: 600; }
    .risk-MEDIUM { color: var(--buy);        font-weight: 600; }
    .risk-HIGH   { color: var(--sell);       font-weight: 600; }
    .risk-EXTREME { color: var(--sell-strong); font-weight: 600; }

    /* ─── Indicator cards grid ──────────────────── */
    .ind-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .ind-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 2px solid transparent;
      border-radius: 8px;
      padding: 11px 13px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: background 0.12s;
      cursor: help;
    }
    .ind-card:hover { background: var(--surface3); }

    .ind-card.sig-pos  { border-left-color: rgba(0,200,83,0.5); }
    .ind-card.sig-neg  { border-left-color: rgba(255,23,68,0.5); }
    .ind-card.sig-zero { border-left-color: rgba(255,214,0,0.35); }

    .ind-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .ind-card-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .ind-card-summary {
      font-size: 12px;
      color: var(--text-sec);
      line-height: 1.4;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .score-pos .score-badge  { background: rgba(0,200,83,0.12);  color: var(--buy-strong); }
    .score-neg .score-badge  { background: rgba(255,23,68,0.12);  color: var(--sell-strong); }
    .score-zero .score-badge { background: rgba(255,214,0,0.10);  color: var(--neutral); }

    /* ─── Triggered rules ───────────────────────── */
    .rules-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .rule-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--orange);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
    }

    .rule-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--orange);
      margin-bottom: 6px;
    }

    .rule-reasons { list-style: none; }
    .rule-reasons li {
      font-size: 12px;
      color: var(--text-sec);
      padding: 1px 0 1px 14px;
      position: relative;
    }
    .rule-reasons li::before {
      content: "›";
      position: absolute;
      left: 2px;
      color: var(--text-muted);
    }

    .no-rules { color: var(--text-sec); font-size: 13px; }

    /* ─── Playbook ───────────────────────────────── */
    .playbook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .playbook-panel {
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      border: 1px solid;
    }
    .playbook-panel.allowed {
      background: rgba(0,200,83,0.04);
      border-color: rgba(0,200,83,0.16);
    }
    .playbook-panel.avoid {
      background: rgba(255,23,68,0.04);
      border-color: rgba(255,23,68,0.14);
    }

    .playbook-col-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .playbook-col-title.allowed { color: var(--buy-strong); }
    .playbook-col-title.avoid   { color: var(--sell-strong); }

    .playbook-items { list-style: none; }
    .playbook-items li {
      font-size: 12px;
      color: var(--text-sec);
      padding: 5px 0;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .playbook-items li:last-child { border-bottom: none; }
    .playbook-items.allowed li::before {
      content: "✓";
      color: var(--buy-strong);
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .playbook-items.avoid li::before {
      content: "✕";
      color: var(--sell-strong);
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ─── Leitura Final ──────────────────────────── */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }

    .summary-text {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text-sec);
      white-space: pre-wrap;
      border-left: 2px solid var(--border-solid);
      padding-left: 16px;
      margin-top: 12px;
    }

    /* ─── Loading / error ────────────────────────── */
    #loading, #error-msg {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-sec);
      font-size: 13px;
    }
    #error-msg { color: var(--sell-strong); display: none; }
    #dashboard { display: none; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border-solid);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Tooltip ────────────────────────────────── */
    .has-tooltip { cursor: help; }

    .tip-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--surface3);
      border: 1px solid var(--border-solid);
      color: var(--text-muted);
      font-size: 9px;
      font-style: normal;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
      cursor: help;
    }
    .tip-icon:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .tooltip-box {
      display: none;
      position: absolute;
      z-index: 9999;
      max-width: 320px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-sec);
      white-space: pre-wrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      pointer-events: none;
      font-family: var(--font-sans);
    }

    /* ─── Share menu ────────────────────────────── */
    .share-wrapper { position: relative; }

    #share-btn {
      background: transparent;
      border: 1px solid var(--orange-dim);
      color: var(--text-sec);
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
      min-height: 32px;
    }
    #share-btn:hover,
    #share-btn.active { border-color: var(--orange); color: var(--orange); background: rgba(224,138,58,0.06); }

    .share-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      min-width: 176px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.65);
      z-index: 200;
    }
    .share-menu.open { display: block; }

    .share-menu a,
    .share-menu button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-sec);
      text-decoration: none;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border-dim);
      cursor: pointer;
      font-family: var(--font-sans);
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    .share-menu a:last-child,
    .share-menu button:last-child { border-bottom: none; }
    .share-menu a:hover,
    .share-menu button:hover { background: var(--surface3); color: var(--text); }

    @media (max-width: 480px) { .share-label { display: none; } }

    /* ─── Overflow / base fixes ─────────────────── */
    body           { overflow-x: hidden; }
    .summary-text  { overflow-wrap: break-word; word-break: break-word; }
    .ind-card      { min-width: 0; }
    .ind-card-summary { overflow-wrap: break-word; }
    .tooltip-box   { max-width: min(320px, calc(100vw - 24px)); }

    /* ─── Responsive — small first, overrides cascade down ── */
    @media (max-width: 780px) {
      .ind-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .hero-grid     { grid-template-columns: 1fr; }
      .playbook-grid { grid-template-columns: 1fr; }
      .hero-value    { font-size: 26px; }
    }

    @media (max-width: 480px) {
      .container     { padding: 16px 14px 40px; }
      .header-inner  { padding: 0 14px; }
      .card, .summary-card { padding: 14px 16px; }
      .logo-sub      { display: none; }
      .timestamp     { display: none; }
      .section-label { margin: 18px 0 8px; }
      #refresh       { min-height: 36px; padding: 6px 14px; }
      .hero-card     { padding: 14px 16px; }
      .hero-value    { font-size: 24px; }
      .rule-item     { padding: 10px 12px; }
      .playbook-panel { padding: 12px 14px; }
      .playbook-items li { padding: 6px 0; }
      .ind-card      { padding: 10px 12px; }
    }

    @media (max-width: 420px) {
      .ind-grid { grid-template-columns: 1fr; }
    }

    /* ─── Context Card ──────────────────────────────── */
    .context-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--ctx-color, var(--orange));
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 4px;
    }

    .context-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }

    .context-left { flex: 1; min-width: 0; }

    .ctx-regime-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .ctx-regime-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      font-family: var(--font-mono);
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .ctx-bias {
      font-size: 12px;
      color: var(--text-muted);
    }

    .ctx-bias strong {
      color: var(--text-sec);
      font-weight: 600;
    }

    .ctx-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      font-size: 12px;
      color: var(--text-sec);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .ctx-price {
      font-size: 16px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: -0.3px;
    }

    .ctx-sep {
      height: 1px;
      background: var(--border-dim);
      margin: 0 0 14px;
    }

    .ctx-insights {
      list-style: none;
      margin: 0 0 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ctx-insights li {
      font-size: 13px;
      color: var(--text-sec);
      padding-left: 14px;
      position: relative;
      line-height: 1.5;
    }

    .ctx-insights li::before {
      content: "·";
      position: absolute;
      left: 3px;
      color: var(--orange);
      font-weight: 900;
      font-size: 16px;
      line-height: 1.1;
    }

    .ctx-reading {
      font-size: 13px;
      color: var(--text-sec);
      border-left: 2px solid var(--border-solid);
      padding-left: 12px;
      line-height: 1.65;
      font-style: italic;
    }

    /* ─── Dimension Scores ──────────────────────────── */
    .dim-scores {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .dim-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
    }

    .dim-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 9px;
    }

    .dim-bar-track {
      height: 3px;
      background: var(--surface3);
      border-radius: 2px;
      position: relative;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .dim-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 2px;
    }

    .dim-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dim-status { font-size: 11px; font-weight: 600; }

    .dim-score {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ─── Indicator Groups ──────────────────────────── */
    .group-section { margin-bottom: 18px; }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .group-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-label::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 1px;
      background: var(--border-dim);
      vertical-align: middle;
    }

    /* ─── Responsive — new components ───────────────── */
    @media (max-width: 600px) {
      .dim-scores         { grid-template-columns: repeat(2, 1fr); }
      .context-header     { flex-direction: column; gap: 10px; }
      .ctx-meta           { flex-direction: row; align-items: center; flex-wrap: wrap; gap: 10px; }
      .ctx-price          { font-size: 14px; }
    }

    @media (max-width: 480px) {
      .context-card       { padding: 14px 16px; }
      .ctx-regime-value   { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-group">
      <div class="logo">
        <span class="logo-icon">₿</span>
        Signal Engine
      </div>

    </div>
    <div class="header-right">
      <span class="timestamp" id="ts">—</span>

      <div class="share-wrapper">
        <button id="share-btn">

            Telegram

          <a id="share-twitter" href="#" target="_blank" rel="noopener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.647l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

</header>

<div class="container">
  <div id="loading"><span class="spinner"></span>Carregando dados...</div>
  <div id="error-msg"></div>

  <div id="dashboard">

    <div class="context-card" id="context-card">
      <div class="context-header">
        <div class="context-left">
          <div class="ctx-regime-label">
            Regime de Mercado
            <span class="tip-icon has-tooltip" data-tooltip="Classificação geral do mercado derivada de todos os indicadores em conjunto.

ZONA DE CAPITULAÇÃO — histórica e rara, excelente para acumular.
COMPRA AGRESSIVA / MODERADA / LEVE — sinal de compra com força variável.
NEUTRO — sem sinal claro, manter DCA normal.
RISCO ELEVADO — mercado em alerta, cautela.
RISCO EXTREMO / EUFORIA — topo de ciclo provável, não aumentar posição.

O viés indica o que o sistema sugere operacionalmente com base nos dados.">?</span>
          </div>
          <div class="ctx-regime-value" id="ctx-regime">—</div>
          <div class="ctx-bias" id="ctx-bias">—</div>
        </div>
        <div class="ctx-meta">
          <div id="ctx-risk">—</div>
          <div id="ctx-score">—</div>
          <div class="ctx-price" id="ctx-price">—</div>
        </div>
      </div>
      <div class="ctx-sep"></div>
      <ul class="ctx-insights" id="ctx-insights"></ul>
      <div class="ctx-reading" id="ctx-reading"></div>
    </div>

    <div class="section-label">Dimensões</div>
    <div class="dim-scores" id="dim-scores"></div>

    <div class="section-label">Indicadores</div>
    <div id="indicators-grouped"></div>

    <div class="section-label">Playbook Tático</div>
    <div class="card">
      <div class="playbook-grid">
        <div class="playbook-panel allowed">
          <div class="playbook-col-title allowed">Permitido</div>
          <ul class="playbook-items allowed" id="playbook-allowed"></ul>
        </div>
        <div class="playbook-panel avoid">
          <div class="playbook-col-title avoid">Evitar</div>
          <ul class="playbook-items avoid" id="playbook-avoid"></ul>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
